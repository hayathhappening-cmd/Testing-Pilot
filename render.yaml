services:
  - name: qa-copilot-api
    type: web
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: API_PORT
        value: "4000"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ADMIN_API_KEY
        sync: false
      - key: OPENAI_USAGE_API_KEY_ID
        sync: false
      - key: OPENAI_USAGE_TOKEN_LIMIT
        value: "0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_SCALE
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
